name: Silver Radar Daily

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00 전날)
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write # 일일 데이터 JSON을 저장소에 커밋하기 위함

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: python -m src.main

      - name: Commit daily data
        run: |
          git config user.name "silver-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "data: $(date -u +%F)" && git push)
