# Silver Radar 설정
# 설계 원칙: "이미 일어난 한국 대형 뉴스"보다 "아직 한국에 없는 날것 아이디어 + 초기 스타트업"을 노린다.

regions:
  korea:
    hl: "ko"
    gl: "KR"
    ceid: "KR:ko"
    queries:
      - "시니어 스타트업 투자"
      - "에이지테크"
      - "고령자 신규 서비스"
      - "AI 안부전화 돌봄"
      - "시니어 돌봄 앱"

  japan:
    hl: "ja"
    gl: "JP"
    ceid: "JP:ja"
    queries:
      - "シニア向け 新サービス"
      - "高齢者 スタートアップ 資金調達"
      - "介護 DX 新規"
      - "見守りサービス"
      - "エイジテック"

  north_america:
    hl: "en-US"
    gl: "US"
    ceid: "US:en"
    queries:
      - "agetech startup seed funding"
      - "eldercare app launch"
      - "senior care startup series A"
      - "aging in place technology"
      - "caregiver app launch"

  europe:
    hl: "en-GB"
    gl: "GB"
    ceid: "GB:en"
    queries:
      - "agetech startup Europe funding"
      - "elderly care technology launch"

lookback_hours: 26
max_articles_per_region: 25

claude:
  model: "claude-haiku-4-5"
  max_tokens: 4000

min_relevance: 5
db_min_relevance: 8

weekly:
  model: "claude-sonnet-4-6"
  max_tokens: 6000
