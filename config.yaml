# Silver Radar 설정
# 트랙 A(디지털 보호자=시니어 안부) + 트랙 B(본인 강점 ∩ 헬스케어: 새 후보 발굴)

regions:
  korea:
    hl: "ko"
    gl: "KR"
    ceid: "KR:ko"
    queries:
      - "시니어 스타트업 투자"
      - "에이지테크"
      - "고령자 신규 서비스"
      - "AI 안부전화 돌봄"
      - "시니어 돌봄 앱"
      - "시니어 헬스케어 AI 스타트업"
      - "원격 모니터링 의료 스타트업"

  japan:
    hl: "ja"
    gl: "JP"
    ceid: "JP:ja"
    queries:
      - "シニア向け 新サービス"
      - "高齢者 スタートアップ 資金調達"
      - "介護 DX 新規"
      - "見守りサービス"
      - "エイジテック"
      - "ヘルスケア AI スタートアップ"

  north_america:
    hl: "en-US"
    gl: "US"
    ceid: "US:en"
    queries:
      - "agetech startup seed funding"
      - "eldercare app launch"
      - "senior care startup series A"
      - "aging in place technology"
      - "caregiver app launch"
      - "remote patient monitoring startup funding"
      - "edge AI healthcare startup"
      - "digital health infrastructure seed"

  europe:
    hl: "en-GB"
    gl: "GB"
    ceid: "GB:en"
    queries:
      - "agetech startup Europe funding"
      - "elderly care technology launch"
      - "digital health startup Europe seed"

lookback_hours: 26
max_articles_per_region: 25

claude:
  model: "claude-haiku-4-5"
  max_tokens: 4000

min_relevance: 5
db_min_relevance: 8

weekly:
  model: "claude-sonnet-4-6"
  max_tokens: 6000
